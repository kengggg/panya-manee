# Verified publication pass: canonical + shadow over the full candidate set.
#
# SELF-HOSTED RUNNER REQUIRED
#   Runs the exact benchmark twice per model on the Mac mini baseline, then
#   applies deterministic verification plus post-hoc publication thresholds.
#
# Safety model:
#   - workflow_dispatch only
#   - Always checks out trusted main
#   - Shared concurrency lock with other benchmark jobs
#   - Requires passing canonical+shadow match before a model can be published

name: Benchmark Verified

on:
  workflow_dispatch:
    inputs:
      batch_id:
        description: 'Verified batch ID (e.g. ntp3-vr1-20260412)'
        required: true
        type: string
      models:
        description: 'Comma-separated model names'
        required: true
        type: string
      preflight_date:
        description: 'Preflight record date YYYYMMDD (for digest check, optional)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run, no API calls, fake answers'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: panya-manee-benchmark
  cancel-in-progress: false

jobs:
  verified:
    runs-on: [self-hosted, macOS, ARM64, panya-manee-baseline]
    timeout-minutes: 360
    steps:
      - name: Checkout trusted ref
        uses: actions/checkout@v6
        with:
          ref: main
          clean: false

      - name: Prepare Python and uv
        run: |
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          /opt/homebrew/bin/python3 --version

      - name: Install dependencies
        run: uv sync --frozen

      - name: Clear stale files for this batch
        env:
          BATCH_ID: ${{ inputs.batch_id }}
        run: |
          mkdir -p benchmark_responses
          find benchmark_responses -maxdepth 1 -type f -name "*${BATCH_ID}*" -delete

      - name: Verify Ollama is reachable
        run: |
          if ! curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
            echo "::error::Ollama is not running at localhost:11434"
            exit 1
          fi

      - name: Verify batch inputs
        env:
          BATCH_ID: ${{ inputs.batch_id }}
          MODELS: ${{ inputs.models }}
        run: |
          uv run python scripts/verify_batch_inputs.py \
            --batch-id "$BATCH_ID" \
            --models "$MODELS" \
            --runs-per-model "2" \
            --subjects "thai,math"

      - name: Run verified publication batch
        env:
          BATCH_ID: ${{ inputs.batch_id }}
          MODELS: ${{ inputs.models }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          DRY_ARG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_ARG="--dry-run"
          fi
          uv run python scripts/run_batch.py \
            --batch-id "$BATCH_ID" \
            --models "$MODELS" \
            --runs-per-model "2" \
            --subjects "thai,math" \
            $DRY_ARG

      - name: Check batch completeness
        if: inputs.dry_run == false
        env:
          BATCH_ID: ${{ inputs.batch_id }}
          MODELS: ${{ inputs.models }}
        run: |
          uv run python scripts/check_batch_completeness.py \
            --batch-id "$BATCH_ID" \
            --models "$MODELS" \
            --runs-per-model "2"

      - name: Apply canonical plus shadow verification gate
        if: inputs.dry_run == false
        env:
          BATCH_ID: ${{ inputs.batch_id }}
          MODELS: ${{ inputs.models }}
          PREFLIGHT_DATE: ${{ inputs.preflight_date }}
        run: |
          PREFLIGHT_ARG=""
          if [ -n "$PREFLIGHT_DATE" ]; then
            PREFLIGHT_ARG="--preflight preflight_records/preflight_${PREFLIGHT_DATE}.json"
          fi
          uv run python scripts/verification_gate.py \
            --batch-id "$BATCH_ID" \
            --expected-models "$MODELS" \
            --expected-runs "2" \
            --canonical-run-index "1" \
            --shadow-run-index "2" \
            $PREFLIGHT_ARG \
            --json-out "benchmark_responses/verification_report_${BATCH_ID}.json"

      - name: Build artifact manifest
        if: always()
        env:
          BATCH_ID: ${{ inputs.batch_id }}
        run: |
          mkdir -p benchmark_responses
          ls -1 benchmark_responses/*"${BATCH_ID}"* 2>/dev/null | sort -u \
            > "benchmark_responses/artifact_manifest_${BATCH_ID}.txt" || true

      - name: Stage verified batch artifact bundle
        if: inputs.dry_run == false
        env:
          BATCH_ID: ${{ inputs.batch_id }}
        run: |
          uv run python scripts/ci/stage_batch_artifact.py \
            --batch-id "$BATCH_ID" \
            --artifact-name "benchmark-verified-${BATCH_ID}" \
            --output-dir "artifact_bundles/${BATCH_ID}"

      - name: Upload verified publication artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-verified-${{ inputs.batch_id }}
          path: artifact_bundles/${{ inputs.batch_id }}
          retention-days: 30
          if-no-files-found: warn

      - name: Job summary
        if: always()
        env:
          BATCH_ID: ${{ inputs.batch_id }}
          MODELS: ${{ inputs.models }}
          PREFLIGHT_DATE: ${{ inputs.preflight_date }}
        run: |
          {
            echo "## Verified Publication Batch: \`${BATCH_ID}\`"
            echo ""
            echo "| Input | Value |"
            echo "|---|---|"
            echo "| Models | \`${MODELS}\` |"
            echo "| Runs/model | 2 |"
            echo "| Preflight date | ${PREFLIGHT_DATE:-'(none)'} |"
            echo "| Dry run | ${{ inputs.dry_run }} |"
            echo ""

            REPORT="benchmark_responses/verification_report_${BATCH_ID}.json"
            if [ -f "$REPORT" ]; then
              echo "### Verification Summary"
              REPORT="$REPORT" python3 scripts/ci/render_verification_summary.py
              echo ""
              echo "### Next Step"
              echo '```bash'
              echo "gh workflow run snapshot-pr.yml -f batch_id=\"${BATCH_ID}\" -f source_run_id=\"${GITHUB_RUN_ID}\""
              echo '```'
            else
              echo "*(Verification report not generated yet)*"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
